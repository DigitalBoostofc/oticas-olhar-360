<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agendar Exame — Óticas Olhar 360</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --azul-bg: #275989;
    --azul-claro: #6CA1B0;
    --amarelo: #EBBF32;
    --cinza-respiro: #F4F6F8;
    --azul-escuro: #1A3D5C;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    font-family: "Saira", system-ui, -apple-system, sans-serif;
    color: var(--azul-escuro);
    -webkit-font-smoothing: antialiased;
    background: transparent;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .card {
    width: 100%;
    max-width: 540px;
    background: #ffffff;
    border-radius: 24px;
    box-shadow:
      0 30px 60px -20px rgba(26, 61, 92, 0.35),
      0 10px 30px -10px rgba(26, 61, 92, 0.18);
    padding: 36px 36px 32px;
    position: relative;
    animation: fadeIn .4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .close-btn {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: #F4F6F8;
    color: var(--azul-escuro);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s ease;
  }

  .close-btn:hover { background: #E2E8F0; }

  .eyebrow {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--azul-bg);
    text-transform: uppercase;
    margin: 0 0 10px;
  }

  .headline {
    font-size: clamp(26px, 4.6vw, 34px);
    font-weight: 900;
    line-height: 1;
    color: var(--azul-escuro);
    margin: 0 0 12px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 14.5px;
    color: #5a7286;
    margin: 0 0 26px;
    line-height: 1.5;
  }

  form { display: flex; flex-direction: column; gap: 18px; }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .field-group { display: flex; flex-direction: column; }

  label {
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--azul-bg);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1.5px solid #E2E8F0;
    background: #fff;
    font-size: 15px;
    color: var(--azul-escuro);
    font-family: inherit;
    transition: border-color .25s, box-shadow .25s;
  }

  input::placeholder { color: #9aa9b7; }

  input:focus {
    outline: none;
    border-color: var(--azul-bg);
    box-shadow: 0 0 0 3px rgba(39, 89, 137, 0.12);
  }

  .submit-btn {
    margin-top: 8px;
    background: var(--amarelo);
    color: var(--azul-escuro);
    border: none;
    border-radius: 14px;
    padding: 18px 24px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    transition: background .25s ease, box-shadow .25s ease, transform .15s ease;
    box-shadow: 0 14px 30px -12px rgba(235, 191, 50, 0.6);
  }

  .submit-btn:hover {
    background: #fac93f;
    box-shadow: 0 18px 40px -12px rgba(235, 191, 50, 0.75);
  }

  .submit-btn:active { transform: translateY(1px); }

  .submit-btn .arrow {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--azul-bg);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform .25s ease;
  }

  .submit-btn:hover .arrow { transform: translateX(3px); }

  @media (max-width: 480px) {
    .card { padding: 28px 22px 24px; border-radius: 20px; }
    .row { grid-template-columns: 1fr; }
    .headline { font-size: 26px; }
  }
</style>
</head>
<body>
  <div class="card">
    <button type="button" class="close-btn" id="closeBtn" aria-label="Fechar">&times;</button>

    <p class="eyebrow">Agendar exame</p>
    <h1 class="headline">VAMOS CUIDAR DA SUA VISÃO.</h1>
    <p class="subtitle">Preencha e enviamos sua solicitação direto pelo WhatsApp.</p>

    <form id="agendaForm" novalidate>
      <div class="field-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required autocomplete="name" />
      </div>

      <div class="field-group">
        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" name="telefone" placeholder="(88) 9 0000-0000" required autocomplete="tel" inputmode="tel" />
      </div>

      <div class="row">
        <div class="field-group">
          <label for="data">Data</label>
          <input type="date" id="data" name="data" required />
        </div>
        <div class="field-group">
          <label for="hora">Hora</label>
          <input type="time" id="hora" name="hora" required />
        </div>
      </div>

      <button type="submit" class="submit-btn">
        Enviar pelo WhatsApp
        <span class="arrow" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </span>
      </button>
    </form>
  </div>

  <script>
    const WHATSAPP_NUMBER = '558892129854';

    function formatDateBR(value) {
      if (!value) return '';
      const [y, m, d] = value.split('-');
      return `${d}/${m}/${y}`;
    }

    function maskPhone(input) {
      let v = input.value.replace(/\D/g, '').slice(0, 11);
      if (v.length > 10) {
        v = v.replace(/^(\d{2})(\d{1})(\d{4})(\d{0,4}).*/, '($1) $2 $3-$4');
      } else if (v.length > 6) {
        v = v.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
      } else if (v.length > 2) {
        v = v.replace(/^(\d{2})(\d{0,5}).*/, '($1) $2');
      } else if (v.length > 0) {
        v = v.replace(/^(\d{0,2}).*/, '($1');
      }
      input.value = v;
    }

    const telefoneInput = document.getElementById('telefone');
    telefoneInput.addEventListener('input', () => maskPhone(telefoneInput));

    document.getElementById('agendaForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const nome = document.getElementById('nome').value.trim();
      const telefone = document.getElementById('telefone').value.trim();
      const data = formatDateBR(document.getElementById('data').value);
      const hora = document.getElementById('hora').value;

      if (!nome || !telefone || !data || !hora) {
        alert('Por favor, preencha todos os campos.');
        return;
      }

      const message =
        `Olá! Gostaria de agendar meu exame de vista:\n` +
        `Nome: ${nome}\n` +
        `Telefone: ${telefone}\n` +
        `Data: ${data}\n` +
        `Hora: ${hora}`;

      const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
      window.open(url, '_blank', 'noopener,noreferrer');
    });

    document.getElementById('closeBtn').addEventListener('click', () => {
      try {
        window.parent.postMessage({ type: 'agendar:close' }, '*');
      } catch (_) {}
    });
  </script>
</body>
</html>
